# Overlay : active la classification photo par Mistral vision (route A1).
# A combiner apres les autres overlays :
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml \
#     -f docker-compose.traefik.yml -f docker-compose.vision.yml \
#     -f docker-compose.watchtower.yml up -d
#
# Utilise l'image officielle GHCR (ghcr.io/whitefoxxyt/mspr-ai-nutrition:latest),
# qui contient le code A1 depuis le commit ab0f5d8, et bascule ANALYZE_BACKEND
# sur mistral_vision (repli automatique sur Food-101 en cas d'echec).
# Plus d'image derivee locale : l'image officielle est desormais suivie par
# Watchtower (voir docker-compose.watchtower.yml) -> CD de bout en bout.
services:
  ai-nutrition:
    environment:
      ANALYZE_BACKEND: mistral_vision
